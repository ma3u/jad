---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataplane
  namespace: edc-v
  labels:
    app: dataplane
    type: edcv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataplane
  template:
    metadata:
      labels:
        app: dataplane
        platform: edcv
        type: edcv-app
    spec:
      initContainers:
        - name: import-ca-certs
          image: ghcr.io/metaform/jad/dataplane:latest
          imagePullPolicy: Always
          command: [ "sh", "-c" ]
          args:
            - |
              # Copy cacerts to shared volume and import GlobalSign Root CA
              # needed for cross-signed chains (e.g. jsonplaceholder.typicode.com)
              cp /opt/java/openjdk/lib/security/cacerts /cacerts/cacerts
              curl -sS http://secure.globalsign.com/cacert/Root-R1.crt -o /tmp/globalsign_r1.crt
              keytool -importcert -keystore /cacerts/cacerts -storepass changeit \
                -noprompt -alias globalsign_root_r1 -file /tmp/globalsign_r1.crt 2>/dev/null || true
              echo "CA certs imported successfully"
          volumeMounts:
            - name: cacerts
              mountPath: /cacerts
      containers:
        - name: dataplane
          image: ghcr.io/metaform/jad/dataplane:latest
          imagePullPolicy: Always
          command: [ "sh", "-c" ]
          args:
            - |
              cp /cacerts/cacerts /opt/java/openjdk/lib/security/cacerts
              exec java -Djava.security.egd=file:/dev/urandom \
                -Djavax.net.ssl.trustStore=/opt/java/openjdk/lib/security/cacerts \
                -Djavax.net.ssl.trustStorePassword=changeit \
                -jar edc-dataplane.jar --log-level=debug
          envFrom:
            - configMapRef:
                name: dataplane-config
          volumeMounts:
            - name: cacerts
              mountPath: /cacerts
          ports:
            - containerPort: 11002
              name: public-port
            - containerPort: 1044
              name: debug-port
            - containerPort: 8083
              name: control-port
            - containerPort: 8186
              name: certs-port
            - containerPort: 8080
              name: health-port
          livenessProbe:
            httpGet:
              path: /api/check/liveness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/check/readiness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 30
          startupProbe:
            httpGet:
              path: /api/check/startup
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 30
      volumes:
        - name: cacerts
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: dataplane
  namespace: edc-v
spec:
  type: ClusterIP
  selector:
    app: dataplane
  ports:
    - name: health
      port: 8080
      targetPort: 8080
    - name: control
      port: 8083
      targetPort: 8083
    - name: certs
      port: 8186
      targetPort: 8186
    - name: public
      port: 11002
      targetPort: 11002

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-dataplane
  namespace: edc-v
spec:
  parentRefs:
    - name: edcv-gateway
      namespace: edc-v
  hostnames:
    - dp.localhost
  rules:
    # /dp/public → public port 11002
    - matches:
        - path:
            type: PathPrefix
            value: /public
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: dataplane
          port: 11002
          weight: 1

    # /app/internal → control port 8083
    - matches:
        - path:
            type: PathPrefix
            value: /app/internal
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: dataplane
          port: 8083
          weight: 1

    # /app/public → certs port 8186
    - matches:
        - path:
            type: PathPrefix
            value: /app/public
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: dataplane
          port: 8186
          weight: 1