---
name: "E2E Tests"

on:
  workflow_run:
    workflows: [ "Verify" ]
    types:
      - completed
    branches: [ main ]

  schedule:
    - cron: '0 3 * * *'  # Run at 3am UTC every day

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  e2e-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: eclipse-edc/.github/.github/actions/setup-build@main

      - name: "Setup Kubectl"
        uses: azure/setup-kubectl@v4

      - name: "Build runtime images"
        run: |
          ./gradlew dockerize
          docker buildx build -f launchers/postgres/Dockerfile --platform linux/amd64,linux/arm64 -t ghcr.io/metaform/jad/postgres:wal2json launchers/postgres

      - name: "Create k8s Kind Cluster"
        uses: helm/kind-action@v1.12.0
        with:
          config: kind.config.yaml
          cluster_name: jad

      - name: "Load runtime images into KinD"
        run: |
          kind load docker-image ghcr.io/metaform/jad/postgres:wal2json \
                                ghcr.io/metaform/jad/controlplane:latest
                                ghcr.io/metaform/jad/dataplane:latest \
                                ghcr.io/metaform/jad/identity-hub:latest
                                ghcr.io/metaform/jad/issuerservice:latest -n jad

      - name: "Install nginx ingress controller"
        run: |-
          kubectl apply -f https://kind.sigs.k8s.io/examples/ingress/deploy-ingress-nginx.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s
      - name: "Deploy JAD"
        run: |
          kubectl apply -k k8s
          kubectl rollout status deployment -n edc-v \
            -l type=edcv-app \
            --timeout=120s

      - name: "Run E2E Test"
        run: |
          ./gradlew dockerize
          ./gradlew test -DincludeTags="EndToEndTest"

      - name: "Print log if test failed"
        if: failure()
        run: |-
          kubectl logs deployment/controlplane -n edc-v

      - name: "Destroy the KinD cluster"
        run: >-
          kind delete cluster -n jad
